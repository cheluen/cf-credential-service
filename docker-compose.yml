services:
  cf-credential-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CHROME_BIN=/usr/bin/chromium
      - CHROMIUM_PATH=/usr/bin/chromium
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
