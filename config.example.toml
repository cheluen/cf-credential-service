# CF Credential Service 配置文件示例
# 复制此文件为 config.toml 并修改配置

#############################################################
#                      优先级说明                            #
#                                                           #
#  请求参数 > 环境变量 > 配置文件 > 默认值                    #
#                                                           #
#  重要：proxy 和 user_agent 应由请求方传入，                 #
#  确保 CF 服务和请求方使用相同的代理和 UA，                  #
#  这样获取的 cf_clearance 才能被请求方使用。                 #
#############################################################

# ============ 服务配置 ============
# 端口也可以通过环境变量 CF_SERVICE_PORT 设置
port = 8080
host = "0.0.0.0"

# ============ 认证配置 ============
# API Key，通过 X-API-Key 请求头传递
# 也可以通过环境变量 CF_SERVICE_PASSWORD 设置
password = "your_api_key_here"

# ============ 浏览器配置 ============
headless = true
chrome_version = "chrome136"  # TLS 指纹版本 (chrome134/135/136/137)

# 浏览器路径（可选，默认自动检测）
# browser_path = "/usr/bin/chromium"

# ============ 默认值配置 ============
# 以下值仅在请求方未传入时使用
# 建议留空，让请求方传入以确保 IP 和 UA 一致

# 默认代理（仅当请求方未传入时使用）
# default_proxy = ""

# 默认 User-Agent（仅当请求方未传入时使用）
# default_user_agent = ""

# 默认超时时间（秒）
default_timeout = 90
