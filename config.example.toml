# CF Credential Service 配置文件示例
# 复制此文件为 config.toml 并修改配置

#############################################################
#                      重要说明                              #
#                                                           #
#  proxy、browser 参数必须由调用者传入，                     #
#  确保获取凭证时和后续请求使用相同的配置。                  #
#  不要在服务端配置这些参数！                                #
#############################################################

# ============ 服务配置 ============
port = 8080
host = "0.0.0.0"

# ============ API Key 认证 ============
# 也可以通过环境变量 CF_SERVICE_API_KEY 设置
api_key = "your_api_key_here"

# ============ 浏览器配置 ============
headless = true

# 浏览器路径（可选，默认自动检测）
# browser_path = "/usr/bin/chromium"

# ============ 超时配置 ============
default_timeout = 90
