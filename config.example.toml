# CF Credential Service 配置文件示例
# 复制此文件为 config.toml 并修改配置

#############################################################
#                      优先级说明                            #
#          环境变量 > 配置文件 > 默认值                       #
#############################################################

# ============ 服务配置 ============
port = 20001
host = "0.0.0.0"

# ============ API Key 认证 ============
# 调用者通过 X-API-Key 请求头传递
# 也可通过环境变量 CF_SERVICE_API_KEY 设置
api_key = "your_api_key_here"

# ============ 默认代理 ============
# 当调用者未传入 proxy 时使用
# 确保调用者和 CF 服务使用相同代理出口 IP
# 也可通过环境变量 CF_SERVICE_PROXY 设置
default_proxy = "http://user:pass@proxy_host:proxy_port"

# ============ 浏览器配置 ============
headless = true
# browser_path = "/usr/bin/chromium"  # 可选，默认自动检测

# ============ 超时配置 ============
default_timeout = 90
